# 本地 MySQL（库名 gaosi_tutor）
# 若已运行 MES 的 MySQL，可共用实例：只执行 make init-db 创建 gaosi_tutor 库
# 用法：docker compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: gaosi-tutor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: gaosi_tutor
    ports:
      - "3307:3306"
    volumes:
      - gaosi_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: gaosi-tutor-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  gaosi_mysql_data:
